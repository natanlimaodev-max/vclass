services:
  vclass:
    build:
      context: .
      dockerfile: projects/vclass/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - projects/vclass/.env.local
    volumes:
      # VRM models are gitignored — mount from host
      - ./projects/vclass/public/models:/app/projects/vclass/public/models:ro
    restart: unless-stopped
